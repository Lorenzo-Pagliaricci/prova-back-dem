apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: java-gitlab-jenkins-template
  title: Java App - GitLab + Jenkins
  description: Crea un repository GitLab con app Java Spring Boot e Jenkinsfile
  tags:
    - java
    - gitlab
    - jenkins
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Informazioni progetto
      required:
        - componentName
        - description
      properties:
        componentName:
          title: Nome componente
          type: string
          description: Nome del componente (sarà anche il nome del repo GitLab)
          ui:autofocus: true
        description:
          title: Descrizione
          type: string
          description: Breve descrizione del progetto
        javaVersion:
          title: Versione Java
          type: string
          default: "17"
          enum:
            - "17"
            - "21"

    - title: Repository GitLab
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository GitLab
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - gitlab.com

    - title: Configurazione Jenkins
      required:
        - jenkinsAgent
      properties:
        jenkinsAgent:
          title: Label agente Jenkins
          type: string
          default: jenkins-agent
          description: Label del nodo Jenkins da usare nella pipeline

  steps:
    - id: fetch-base
      name: Genera struttura progetto
      action: fetch:template
      input:
        url: ./content
        values:
          componentName: ${{ parameters.componentName }}
          description: ${{ parameters.description }}
          javaVersion: ${{ parameters.javaVersion }}
          jenkinsAgent: ${{ parameters.jenkinsAgent }}

    - id: publish
      name: Pubblica su GitLab
      action: publish:gitlab
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Registra nel catalogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository GitLab
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Apri nel catalogo
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
