apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: java-gitlab-jenkins-template
  title: Java App - GitLab + Jenkins
  description: Crea un repository GitLab con app Java Spring Boot e catalog-info con annotation Jenkins
  tags:
    - java
    - gitlab
    - jenkins
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Project info
      required:
        - componentName
        - description
        - owner
      properties:
        componentName:
          title: Component name
          type: string
          description: Nome componente (usato anche come artifactId)
          ui:autofocus: true
          pattern: '^[a-z0-9-]+$'
          ui:help: Usa solo minuscole, numeri e trattini
        description:
          title: Description
          type: string
          description: Breve descrizione del progetto
        owner:
          title: Owner
          type: string
          description: Entity owner del componente Backstage (es. user:guest o group:default/team)
          default: user:guest
        javaVersion:
          title: Java version
          type: string
          default: "17"
          enum:
            - "17"
            - "21"

    - title: GitLab repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: GitLab repository
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - gitlab.com

    - title: Jenkins
      required:
        - jenkinsJobFullName
      properties:
        jenkinsJobFullName:
          title: Jenkins job full name
          type: string
          description: Nome job Jenkins (es. my-job oppure folder/my-job)

  steps:
    - id: fetch-base
      name: Generate project
      action: fetch:template
      input:
        url: ./content
        values:
          componentName: ${{ parameters.componentName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          javaVersion: ${{ parameters.javaVersion }}
          jenkinsJobFullName: ${{ parameters.jenkinsJobFullName }}

    - id: publish
      name: Publish to GitLab
      action: publish:gitlab
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private

    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
